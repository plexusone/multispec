site_name: MultiSpec
site_description: Multi-domain specification orchestration for humans and AI agents
site_url: https://plexusone.github.io/multispec
repo_url: https://github.com/plexusone/multispec
repo_name: plexusone/multispec

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    # Dark mode first (PlexusOne default)
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy

extra_css:
  - https://plexusone.dev/css/plexusone-mkdocs.css

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
      - Concepts: getting-started/concepts.md
  - CLI Reference:
      - Overview: cli/index.md
      - init: cli/init.md
      - lint: cli/lint.md
      - status: cli/status.md
  - MCP Server:
      - Overview: mcp/index.md
      - Tools: mcp/tools.md
  - Specifications:
      - ROADMAP: specs/ROADMAP.md
  - Development:
      - Contributing: development/contributing.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/plexusone/multispec
