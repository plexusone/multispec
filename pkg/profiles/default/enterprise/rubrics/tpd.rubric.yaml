# Enterprise TPD Evaluation Rubric

spec_type: tpd
name: "Enterprise TPD Rubric"
description: "Test Plan Document evaluation for enterprise implementations"
version: "1.0"

categories:
  - id: prd_coverage
    name: "PRD Coverage"
    description: "Whether all PRD acceptance criteria have corresponding test cases"
    weight: 0.18
    required: true
    criteria:
      pass: "Every PRD requirement has mapped test cases with clear traceability"
      partial: "Most requirements covered but some gaps exist"
      fail: "No systematic mapping from requirements to tests"

  - id: trd_coverage
    name: "TRD Coverage"
    description: "Technical components and APIs have adequate test coverage"
    weight: 0.15
    required: true
    criteria:
      pass: "All APIs, integrations, and data models have test scenarios"
      partial: "Major components covered but edge cases missing"
      fail: "Technical testing inadequate"

  - id: uxd_coverage
    name: "UXD Coverage"
    description: "User journeys have corresponding E2E and UAT tests"
    weight: 0.12
    required: true
    criteria:
      pass: "All critical user journeys have E2E tests and UAT scenarios"
      partial: "Happy paths covered but alternative flows missing"
      fail: "No user journey testing defined"

  - id: test_automation
    name: "Test Automation Strategy"
    description: "Clear automation strategy with appropriate coverage targets"
    weight: 0.12
    required: true
    criteria:
      pass: "Comprehensive automation strategy with framework selection and coverage targets"
      partial: "Basic automation plan but missing details"
      fail: "No automation strategy"

  - id: nft_coverage
    name: "Non-Functional Testing"
    description: "Coverage of performance, security, and reliability testing"
    weight: 0.15
    required: true
    criteria:
      pass: "Complete NFT plan including performance, security, chaos, and accessibility"
      partial: "Some NFT coverage but gaps in critical areas"
      fail: "No non-functional testing defined"

  - id: test_environment
    name: "Test Environment"
    description: "Test environment and infrastructure clearly defined"
    weight: 0.08
    required: true
    criteria:
      pass: "Complete environment specs with setup instructions and parity requirements"
      partial: "Basic environment defined but missing details"
      fail: "No test environment defined"

  - id: test_data
    name: "Test Data Strategy"
    description: "Test data requirements and management approach"
    weight: 0.08
    required: true
    criteria:
      pass: "Complete data strategy including generation, anonymization, and cleanup"
      partial: "Basic data approach but missing privacy or management details"
      fail: "No test data strategy"

  - id: ci_integration
    name: "CI/CD Integration"
    description: "Tests integrated into CI/CD pipeline with appropriate gates"
    weight: 0.07
    required: true
    criteria:
      pass: "Clear CI/CD integration with test stages and blocking criteria"
      partial: "Some CI integration but incomplete pipeline coverage"
      fail: "No CI/CD integration defined"

  - id: sign_off
    name: "Sign-Off Criteria"
    description: "Clear exit criteria and sign-off process"
    weight: 0.05
    required: false
    criteria:
      pass: "Clear sign-off criteria with stakeholder responsibilities"
      partial: "Some criteria defined but vague"
      fail: "No sign-off process"

pass_criteria:
  require_all_pass: false
  max_critical: 0
  max_high: 0
  max_medium: 2
