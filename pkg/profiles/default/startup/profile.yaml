name: startup
description: "Lightweight configuration for pre-PMF startups. Only PRD required."

spec_config:
  # Source specs: only PRD required
  prd:
    required: true
    category: source
  mrd:
    required: false
    category: source
  uxd:
    required: false
    category: source

  # GTM specs: all optional for pre-PMF
  press:
    required: false
    category: gtm
  faq:
    required: false
    category: gtm
  narrative-1p:
    required: false
    category: gtm
  narrative-6p:
    required: false
    category: gtm

  # Technical specs: optional until architecture stabilizes
  trd:
    required: false
    category: technical
  ird:
    required: false
    category: technical
